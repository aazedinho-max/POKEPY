<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetGotchi</title>
    <style>
        body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .device { width: 300px; background: #ffb7c5; border-radius: 30px; padding: 20px; text-align: center; }
        .screen { background: #9bbc0f; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; }
        img { width: 80px; height: 80px; }
        button { margin: 10px; padding: 10px; border-radius: 50%; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="device">
        <div class="screen">
            <img id="pet" src="">
            <div id="status">Carregando...</div>
        </div>
        <button onclick="enviarAcao('comer')">🍎</button>
        <button onclick="enviarAcao('brincar')">🎮</button>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyK4F24g5bta7JhUjreKaxS3HhglnT0SIaM_XyerMthbQwHF88EHSCDP7Ocy5kraA/exec';

        async function carregarDados() {
            try {
                const res = await fetch(WEB_APP_URL + "?comando=get");
                const s = await res.json();
                document.getElementById('pet').src = s.sprite;
                document.getElementById('status').innerText = `Fome: ${Math.floor(s.fome)} | Saúde: ${Math.floor(s.felicidade)}`;
            } catch (e) { document.getElementById('status').innerText = "Erro na conexão"; }
        }

        async function enviarAcao(tipo) {
            document.getElementById('status').innerText = "Enviando...";
            await fetch(WEB_APP_URL + "?comando=" + tipo);
            carregarDados();
        }

        carregarDados();
    </script>
</body>
</html>
